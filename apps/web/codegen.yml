schema: http://localhost:4000/graphql
documents: src/graphql/**/*.graphql
generates:
  src/graphql/generated.ts:
    plugins:
      - typescript
      - typescript-operations
      - typescript-react-query
    config:
      fetcher: '../lib/graphql-client#fetcher'
      exposeQueryKeys: true
      exposeFetcher: true
      reactQueryVersion: 5

